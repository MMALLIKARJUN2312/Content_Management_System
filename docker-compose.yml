services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/renewcred_cms
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      CORS_ORIGINS: http://localhost:${ADMIN_FRONTEND_PORT:-3001},http://localhost:${PUBLIC_FRONTEND_PORT:-3000}

  admin-frontend:
    build: ./admin-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${ADMIN_FRONTEND_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-5000}/api/v1

  public-frontend:
    build: ./public-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PUBLIC_FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-5000}/api/v1

volumes:
  mongo_data:
